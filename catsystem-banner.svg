<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020810"/>
      <stop offset="50%" style="stop-color:#040d1a"/>
      <stop offset="100%" style="stop-color:#000508"/>
    </linearGradient>

    <!-- Cyan glow for cat -->
    <radialGradient id="catGlow" cx="50%" cy="60%" r="50%">
      <stop offset="0%" style="stop-color:#00eeff;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#00eeff;stop-opacity:0"/>
    </radialGradient>

    <!-- Title glow -->
    <filter id="titleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="catFilter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Scanline pattern -->
    <pattern id="scanlines" x="0" y="0" width="900" height="3" patternUnits="userSpaceOnUse">
      <rect width="900" height="1" fill="#00eeff" opacity="0.03"/>
    </pattern>

    <!-- Grid pattern -->
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00eeff" stroke-width="0.3" opacity="0.08"/>
    </pattern>

    <!-- Cat shadow mask -->
    <radialGradient id="shadowGrad" cx="50%" cy="100%" r="60%">
      <stop offset="0%" style="stop-color:#00eeff;stop-opacity:0.25"/>
      <stop offset="60%" style="stop-color:#0044aa;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0"/>
    </radialGradient>

    <linearGradient id="tagGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00eeff;stop-opacity:0.15"/>
      <stop offset="50%" style="stop-color:#00eeff;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#00eeff;stop-opacity:0.15"/>
    </linearGradient>

    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00eeff;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#00eeff;stop-opacity:0.8"/>
      <stop offset="70%" style="stop-color:#00eeff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#00eeff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" fill="url(#bg)"/>
  <rect width="900" height="300" fill="url(#grid)"/>
  <rect width="900" height="300" fill="url(#scanlines)"/>

  <!-- Corner accents -->
  <polyline points="20,20 20,50 50,50" fill="none" stroke="#00eeff" stroke-width="1.5" opacity="0.6"/>
  <polyline points="880,20 880,50 850,50" fill="none" stroke="#00eeff" stroke-width="1.5" opacity="0.6"/>
  <polyline points="20,280 20,250 50,250" fill="none" stroke="#00eeff" stroke-width="1.5" opacity="0.6"/>
  <polyline points="880,280 880,250 850,250" fill="none" stroke="#00eeff" stroke-width="1.5" opacity="0.6"/>

  <!-- Outer border -->
  <rect x="10" y="10" width="880" height="280" fill="none" stroke="#00eeff" stroke-width="0.5" opacity="0.2" rx="2"/>

  <!-- Cat glow backdrop -->
  <ellipse cx="175" cy="185" rx="110" ry="110" fill="url(#catGlow)"/>
  <ellipse cx="175" cy="220" rx="90" ry="40" fill="url(#shadowGrad)"/>

  <!-- ======= CAT SILHOUETTE ======= -->
  <!-- Hoodie/body shadow layer (darker, wider) -->
  <ellipse cx="175" cy="230" rx="72" ry="28" fill="#00eeff" opacity="0.04"/>

  <!-- Hoodie body -->
  <path d="M108,285 Q108,240 115,225 Q130,205 155,198 L155,185 Q145,182 140,175 Q138,165 140,158 
           Q150,130 175,128 Q200,130 210,158 Q212,165 210,175 Q205,182 195,185 L195,198 
           Q220,205 235,225 Q242,240 242,285 Z" 
        fill="#041525" stroke="#00eeff" stroke-width="1" opacity="0.95"/>

  <!-- Hoodie front pocket -->
  <path d="M150,245 Q175,238 200,245 L198,270 Q175,275 152,270 Z" 
        fill="#031020" stroke="#00eeff" stroke-width="0.7" opacity="0.7"/>

  <!-- Hoodie strings -->
  <line x1="163" y1="210" x2="158" y2="245" stroke="#00eeff" stroke-width="0.8" opacity="0.4"/>
  <line x1="187" y1="210" x2="192" y2="245" stroke="#00eeff" stroke-width="0.8" opacity="0.4"/>

  <!-- Hood shadow area around face -->
  <path d="M135,175 Q138,145 150,138 Q160,130 175,128 Q190,130 200,138 Q212,145 215,175 
           Q212,195 200,200 Q190,205 175,205 Q160,205 150,200 Q138,195 135,175 Z" 
        fill="#020e1e" stroke="#00eeff" stroke-width="1.2" opacity="0.9"/>

  <!-- Hood outer rim -->
  <path d="M128,168 Q128,125 155,112 Q165,107 175,106 Q185,107 195,112 Q222,125 222,168" 
        fill="none" stroke="#00eeff" stroke-width="1.5" opacity="0.55"/>

  <!-- Cat ears (inside hood) -->
  <polygon points="152,133 145,112 163,125" fill="#041828" stroke="#00eeff" stroke-width="1" opacity="0.9"/>
  <polygon points="198,133 205,112 187,125" fill="#041828" stroke="#00eeff" stroke-width="1" opacity="0.9"/>
  <!-- Inner ear -->
  <polygon points="153,131 148,116 161,126" fill="#00eeff" opacity="0.12"/>
  <polygon points="197,131 202,116 189,126" fill="#00eeff" opacity="0.12"/>

  <!-- Face -->
  <ellipse cx="175" cy="168" rx="28" ry="26" fill="#030f1e" stroke="#00eeff" stroke-width="0.8" opacity="0.9"/>

  <!-- Eyes - glowing cyan -->
  <ellipse cx="164" cy="164" rx="7" ry="5" fill="#041828" stroke="#00eeff" stroke-width="1"/>
  <ellipse cx="186" cy="164" rx="7" ry="5" fill="#041828" stroke="#00eeff" stroke-width="1"/>
  <!-- Pupils (slit) -->
  <ellipse cx="164" cy="164" rx="2.5" ry="4" fill="#00eeff" opacity="0.9"/>
  <ellipse cx="186" cy="164" rx="2.5" ry="4" fill="#00eeff" opacity="0.9"/>
  <!-- Eye shine -->
  <ellipse cx="162" cy="162" rx="1" ry="1" fill="#ffffff" opacity="0.8"/>
  <ellipse cx="184" cy="162" rx="1" ry="1" fill="#ffffff" opacity="0.8"/>
  <!-- Eye glow -->
  <ellipse cx="164" cy="164" rx="9" ry="7" fill="none" stroke="#00eeff" stroke-width="0.5" opacity="0.4"/>
  <ellipse cx="186" cy="164" rx="9" ry="7" fill="none" stroke="#00eeff" stroke-width="0.5" opacity="0.4"/>

  <!-- Nose -->
  <polygon points="175,171 172,174 178,174" fill="#00eeff" opacity="0.7"/>

  <!-- Whiskers -->
  <line x1="148" y1="173" x2="168" y2="175" stroke="#00eeff" stroke-width="0.7" opacity="0.5"/>
  <line x1="148" y1="177" x2="168" y2="177" stroke="#00eeff" stroke-width="0.7" opacity="0.4"/>
  <line x1="182" y1="175" x2="202" y2="173" stroke="#00eeff" stroke-width="0.7" opacity="0.5"/>
  <line x1="182" y1="177" x2="202" y2="177" stroke="#00eeff" stroke-width="0.7" opacity="0.4"/>

  <!-- Mouth -->
  <path d="M172,177 Q175,181 178,177" fill="none" stroke="#00eeff" stroke-width="0.8" opacity="0.6"/>

  <!-- Tail -->
  <path d="M242,270 Q270,245 265,220 Q260,200 248,210 Q240,218 250,228" 
        fill="none" stroke="#00eeff" stroke-width="2" opacity="0.5" stroke-linecap="round"/>

  <!-- ======= TEXT SECTION ======= -->

  <!-- Bracket decoration -->
  <text x="330" y="108" font-family="'Courier New', monospace" font-size="28" fill="#00eeff" opacity="0.4">[</text>
  <text x="826" y="108" font-family="'Courier New', monospace" font-size="28" fill="#00eeff" opacity="0.4">]</text>

  <!-- Main title -->
  <text x="580" y="135" 
        font-family="'Courier New', monospace" 
        font-size="62" 
        font-weight="bold"
        text-anchor="middle"
        fill="#00eeff" 
        filter="url(#titleGlow)"
        letter-spacing="6"
        opacity="0.95">Cat-System</text>

  <!-- Subtitle line -->
  <rect x="340" y="148" width="480" height="1" fill="url(#lineGrad)" opacity="0.6"/>

  <!-- Version -->
  <text x="580" y="175" 
        font-family="'Courier New', monospace" 
        font-size="13" 
        text-anchor="middle"
        fill="#00eeff" 
        letter-spacing="8"
        opacity="0.55">v4.0  ·  CORE LOADED</text>

  <!-- Tags row -->
  <g transform="translate(340, 200)">
    <!-- Windows -->
    <rect x="0" y="0" width="102" height="28" rx="3" fill="url(#tagGrad)" stroke="#00eeff" stroke-width="0.7" opacity="0.8"/>
    <text x="51" y="19" font-family="'Courier New', monospace" font-size="11" text-anchor="middle" fill="#00eeff" letter-spacing="2" opacity="0.9">WINDOWS</text>

    <!-- Privacy -->
    <rect x="119" y="0" width="102" height="28" rx="3" fill="url(#tagGrad)" stroke="#00eeff" stroke-width="0.7" opacity="0.8"/>
    <text x="170" y="19" font-family="'Courier New', monospace" font-size="11" text-anchor="middle" fill="#00eeff" letter-spacing="2" opacity="0.9">PRIVACY</text>

    <!-- Optimize -->
    <rect x="238" y="0" width="102" height="28" rx="3" fill="url(#tagGrad)" stroke="#00eeff" stroke-width="0.7" opacity="0.8"/>
    <text x="289" y="19" font-family="'Courier New', monospace" font-size="11" text-anchor="middle" fill="#00eeff" letter-spacing="2" opacity="0.9">OPTIMIZE</text>

    <!-- Net -->
    <rect x="357" y="0" width="102" height="28" rx="3" fill="url(#tagGrad)" stroke="#00eeff" stroke-width="0.7" opacity="0.8"/>
    <text x="408" y="19" font-family="'Courier New', monospace" font-size="11" text-anchor="middle" fill="#00eeff" letter-spacing="2" opacity="0.9">NET</text>
  </g>

  <!-- Bottom line -->
  <rect x="340" y="245" width="480" height="0.8" fill="url(#lineGrad)" opacity="0.35"/>

  <!-- Author -->
  <text x="580" y="268" 
        font-family="'Courier New', monospace" 
        font-size="11" 
        text-anchor="middle"
        fill="#00eeff" 
        letter-spacing="4"
        opacity="0.35">BY TC4DY</text>

  <!-- Decorative dots -->
  <circle cx="340" cy="150" r="2" fill="#00eeff" opacity="0.5"/>
  <circle cx="820" cy="150" r="2" fill="#00eeff" opacity="0.5"/>
  <circle cx="340" cy="244" r="2" fill="#00eeff" opacity="0.3"/>
  <circle cx="820" cy="244" r="2" fill="#00eeff" opacity="0.3"/>

  <!-- Small hex decorations -->
  <text x="348" y="270" font-family="'Courier New', monospace" font-size="9" fill="#00eeff" opacity="0.2">0x4354</text>
  <text x="768" y="270" font-family="'Courier New', monospace" font-size="9" fill="#00eeff" opacity="0.2">SYS::OK</text>
</svg>
