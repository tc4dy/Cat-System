<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#010810"/>
      <stop offset="100%" style="stop-color:#020d18"/>
    </linearGradient>

    <radialGradient id="centerGlow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" style="stop-color:#00eeff;stop-opacity:0.14"/>
      <stop offset="100%" style="stop-color:#00eeff;stop-opacity:0"/>
    </radialGradient>

    <radialGradient id="floorShadow" cx="50%" cy="100%" r="50%">
      <stop offset="0%" style="stop-color:#00eeff;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#00eeff;stop-opacity:0"/>
    </radialGradient>

    <filter id="glow2" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="titleGlow2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <pattern id="grid2" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#00eeff" stroke-width="0.25" opacity="0.07"/>
    </pattern>

    <linearGradient id="tagGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00eeff;stop-opacity:0.1"/>
      <stop offset="50%" style="stop-color:#00eeff;stop-opacity:0.22"/>
      <stop offset="100%" style="stop-color:#00eeff;stop-opacity:0.1"/>
    </linearGradient>

    <linearGradient id="hLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00eeff;stop-opacity:0"/>
      <stop offset="40%" style="stop-color:#00eeff;stop-opacity:0.7"/>
      <stop offset="60%" style="stop-color:#00eeff;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#00eeff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- BG -->
  <rect width="400" height="400" fill="url(#bg2)"/>
  <rect width="400" height="400" fill="url(#grid2)"/>

  <!-- Outer border -->
  <rect x="8" y="8" width="384" height="384" fill="none" stroke="#00eeff" stroke-width="0.6" opacity="0.18" rx="4"/>
  <rect x="14" y="14" width="372" height="372" fill="none" stroke="#00eeff" stroke-width="0.3" opacity="0.1" rx="3"/>

  <!-- Corner brackets -->
  <polyline points="16,16 16,44 44,44" fill="none" stroke="#00eeff" stroke-width="2" opacity="0.7"/>
  <polyline points="384,16 384,44 356,44" fill="none" stroke="#00eeff" stroke-width="2" opacity="0.7"/>
  <polyline points="16,384 16,356 44,356" fill="none" stroke="#00eeff" stroke-width="2" opacity="0.7"/>
  <polyline points="384,384 384,356 356,356" fill="none" stroke="#00eeff" stroke-width="2" opacity="0.7"/>

  <!-- Center glow -->
  <ellipse cx="200" cy="180" rx="150" ry="140" fill="url(#centerGlow)"/>
  <ellipse cx="200" cy="320" rx="120" ry="45" fill="url(#floorShadow)"/>

  <!-- ======= CAT ======= -->

  <!-- Hoodie body -->
  <path d="M108,370 Q108,310 118,290 Q135,265 165,255 L165,238 
           Q152,234 146,224 Q143,213 146,204 
           Q158,168 200,165 Q242,168 254,204 
           Q257,213 254,224 Q248,234 235,238 L235,255 
           Q265,265 282,290 Q292,310 292,370 Z" 
        fill="#030f1d" stroke="#00eeff" stroke-width="1.2" opacity="0.95"/>

  <!-- Hoodie pocket -->
  <path d="M163,310 Q200,302 237,310 L234,345 Q200,352 166,345 Z" 
        fill="#020b17" stroke="#00eeff" stroke-width="0.8" opacity="0.65"/>

  <!-- Hoodie strings -->
  <line x1="184" y1="268" x2="178" y2="310" stroke="#00eeff" stroke-width="1" opacity="0.35"/>
  <line x1="216" y1="268" x2="222" y2="310" stroke="#00eeff" stroke-width="1" opacity="0.35"/>

  <!-- Hood -->
  <path d="M145,230 Q148,185 165,168 Q180,157 200,155 Q220,157 235,168 Q252,185 255,230 
           Q252,255 235,262 Q220,268 200,268 Q180,268 165,262 Q148,255 145,230 Z" 
        fill="#020c1b" stroke="#00eeff" stroke-width="1.3" opacity="0.92"/>

  <!-- Hood outer -->
  <path d="M138,222 Q138,170 168,152 Q182,144 200,143 Q218,144 232,152 Q262,170 262,222" 
        fill="none" stroke="#00eeff" stroke-width="1.8" opacity="0.5"/>

  <!-- Ears -->
  <polygon points="165,170 155,143 178,160" fill="#031322" stroke="#00eeff" stroke-width="1.2" opacity="0.92"/>
  <polygon points="235,170 245,143 222,160" fill="#031322" stroke="#00eeff" stroke-width="1.2" opacity="0.92"/>
  <!-- Inner ear tint -->
  <polygon points="166,168 158,148 176,161" fill="#00eeff" opacity="0.1"/>
  <polygon points="234,168 242,148 224,161" fill="#00eeff" opacity="0.1"/>

  <!-- Face -->
  <ellipse cx="200" cy="220" rx="38" ry="35" fill="#020c1a" stroke="#00eeff" stroke-width="0.9" opacity="0.9"/>

  <!-- Eyes -->
  <ellipse cx="186" cy="215" rx="9" ry="7" fill="#041828" stroke="#00eeff" stroke-width="1.2"/>
  <ellipse cx="214" cy="215" rx="9" ry="7" fill="#041828" stroke="#00eeff" stroke-width="1.2"/>
  <!-- Slit pupils -->
  <ellipse cx="186" cy="215" rx="3" ry="6" fill="#00eeff" opacity="0.95" filter="url(#glow2)"/>
  <ellipse cx="214" cy="215" rx="3" ry="6" fill="#00eeff" opacity="0.95" filter="url(#glow2)"/>
  <!-- Shine -->
  <ellipse cx="183" cy="212" rx="1.5" ry="1.5" fill="#ffffff" opacity="0.85"/>
  <ellipse cx="211" cy="212" rx="1.5" ry="1.5" fill="#ffffff" opacity="0.85"/>
  <!-- Eye outer glow rings -->
  <ellipse cx="186" cy="215" rx="12" ry="9" fill="none" stroke="#00eeff" stroke-width="0.6" opacity="0.3"/>
  <ellipse cx="214" cy="215" rx="12" ry="9" fill="none" stroke="#00eeff" stroke-width="0.6" opacity="0.3"/>

  <!-- Nose -->
  <polygon points="200,225 196,229 204,229" fill="#00eeff" opacity="0.7"/>

  <!-- Mouth -->
  <path d="M196,232 Q200,237 204,232" fill="none" stroke="#00eeff" stroke-width="1" opacity="0.6"/>

  <!-- Whiskers -->
  <line x1="162" y1="226" x2="188" y2="228" stroke="#00eeff" stroke-width="0.8" opacity="0.45"/>
  <line x1="162" y1="231" x2="188" y2="231" stroke="#00eeff" stroke-width="0.8" opacity="0.35"/>
  <line x1="212" y1="228" x2="238" y2="226" stroke="#00eeff" stroke-width="0.8" opacity="0.45"/>
  <line x1="212" y1="231" x2="238" y2="231" stroke="#00eeff" stroke-width="0.8" opacity="0.35"/>

  <!-- ======= TEXT ======= -->

  <!-- Title -->
  <text x="200" y="82" 
        font-family="'Courier New', monospace" 
        font-size="36" 
        font-weight="bold"
        text-anchor="middle"
        fill="#00eeff"
        filter="url(#titleGlow2)"
        letter-spacing="3"
        opacity="0.95">Cat-System</text>

  <!-- Line under title -->
  <rect x="60" y="90" width="280" height="0.8" fill="url(#hLine)" opacity="0.5"/>

  <!-- Version small -->
  <text x="200" y="108" 
        font-family="'Courier New', monospace" 
        font-size="10" 
        text-anchor="middle"
        fill="#00eeff" 
        letter-spacing="5"
        opacity="0.4">v4.0  ·  WIN OPTIMIZER</text>

  <!-- Tags -->
  <g transform="translate(44, 372)">
    <rect x="0" y="-18" width="68" height="20" rx="2" fill="url(#tagGrad2)" stroke="#00eeff" stroke-width="0.6" opacity="0.75"/>
    <text x="34" y="-4" font-family="'Courier New', monospace" font-size="9" text-anchor="middle" fill="#00eeff" letter-spacing="1.5" opacity="0.85">WINDOWS</text>

    <rect x="76" y="-18" width="60" height="20" rx="2" fill="url(#tagGrad2)" stroke="#00eeff" stroke-width="0.6" opacity="0.75"/>
    <text x="106" y="-4" font-family="'Courier New', monospace" font-size="9" text-anchor="middle" fill="#00eeff" letter-spacing="1.5" opacity="0.85">PRIVACY</text>

    <rect x="144" y="-18" width="68" height="20" rx="2" fill="url(#tagGrad2)" stroke="#00eeff" stroke-width="0.6" opacity="0.75"/>
    <text x="178" y="-4" font-family="'Courier New', monospace" font-size="9" text-anchor="middle" fill="#00eeff" letter-spacing="1.5" opacity="0.85">OPTIMIZE</text>

    <rect x="220" y="-18" width="48" height="20" rx="2" fill="url(#tagGrad2)" stroke="#00eeff" stroke-width="0.6" opacity="0.75"/>
    <text x="244" y="-4" font-family="'Courier New', monospace" font-size="9" text-anchor="middle" fill="#00eeff" letter-spacing="1.5" opacity="0.85">NET</text>
  </g>

  <!-- Tiny hex info -->
  <text x="22" y="394" font-family="'Courier New', monospace" font-size="8" fill="#00eeff" opacity="0.18">TC4DY</text>
  <text x="330" y="394" font-family="'Courier New', monospace" font-size="8" fill="#00eeff" opacity="0.18">SYS::INIT</text>
</svg>
